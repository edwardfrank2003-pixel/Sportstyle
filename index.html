<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SportyStyle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>SportyStyle 🏋️‍♂️</h1>

  <!-- LOGIN -->
  <div id="auth">
    <input type="text" id="loginNombre" placeholder="Tu nombre">
    <button id="login">Iniciar Sesión</button>
    <button id="logout" style="display:none;">Cerrar Sesión</button>
    <p id="user"></p>
  </div>

  <!-- PRODUCTOS -->
  <h2>Productos</h2>
  <div class="productos">
    <div class="producto">
      <h3>Camiseta Deportiva</h3>
      <p>$10000</p>
      <button onclick="agregarCarrito('Camiseta', 10000)">Agregar</button>
    </div>

    <div class="producto">
      <h3>Pantalón Deportivo</h3>
      <p>$15000</p>
      <button onclick="agregarCarrito('Pantalón', 15000)">Agregar</button>
    </div>

    <div class="producto">
      <h3>Botella Deportiva</h3>
      <p>$5000</p>
      <button onclick="agregarCarrito('Botella', 5000)">Agregar</button>
    </div>
  </div>

  <!-- CARRITO -->
  <h2>Carrito</h2>
  <ul id="carrito"></ul>
  <p id="total"></p>

  <!-- FORMULARIO -->
  <h2>Pago</h2>
  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre completo" required><br>
    <input type="text" id="direccion" placeholder="Dirección" required><br>
    <input type="email" id="correo" placeholder="Correo" required><br>
    <input type="text" id="telefono" placeholder="Teléfono" required><br>
    <button type="submit">Comprar</button>
  </form>

  <p id="mensaje"></p>

  <script src="app.js"></script>
</body>
</html>
